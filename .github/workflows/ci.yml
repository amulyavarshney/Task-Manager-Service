name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Unit & slice tests
        run: mvn -B test

      - name: Testcontainers integration
        env:
          RUN_TESTCONTAINERS: "true"
        run: mvn -B -Dtest=TaskIntegrationTest test

      - name: Package
        run: mvn -B -DskipTests package

  frontend:
    name: Frontend (Vite + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start Postgres
        run: |
          docker run -d --name tm-pg \
            -e POSTGRES_DB=taskmanager \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec tm-pg pg_isready -U postgres && break
            sleep 1
          done

      - name: Build & start API
        env:
          DB_URL: jdbc:postgresql://localhost:5432/taskmanager
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          API_KEY_ADMIN: dev-admin-key
          SECURITY_ENABLED: "true"
        run: |
          mvn -B -DskipTests package
          nohup java -jar target/task-manager-*.jar > /tmp/api.log 2>&1 &
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8080/actuator/health/liveness && break
            sleep 2
          done

      - name: Install frontend & Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start Vite preview
        working-directory: frontend
        run: |
          npm run build
          npx vite preview --host 127.0.0.1 --port 5173 > /tmp/web.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:5173/ >/dev/null && break
            sleep 1
          done

      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_API_KEY: dev-admin-key
        run: npm run test:e2e

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t task-manager-api:ci .

      - name: Build web image
        run: docker build -t task-manager-web:ci ./frontend
