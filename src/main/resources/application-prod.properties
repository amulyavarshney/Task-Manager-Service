# Production profile
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

logging.structured.format.console=logstash
logging.level.root=INFO
logging.level.com.example.taskmanager=INFO
logging.level.org.hibernate.SQL=WARN

management.endpoint.health.show-details=never

# Tighten defaults; override via env in real deployments
task.executor.await-termination-seconds=60
spring.lifecycle.timeout-per-shutdown-phase=60s

# Require explicit API keys in production (do not rely on defaults)
app.security.enabled=true
