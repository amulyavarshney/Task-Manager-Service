server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

task.executor.core-pool-size=${TASK_EXECUTOR_CORE:2}
task.executor.max-pool-size=${TASK_EXECUTOR_MAX:4}
task.executor.queue-capacity=${TASK_EXECUTOR_QUEUE:10}
task.executor.await-termination-seconds=30

task.scheduler.interval-ms=${TASK_SCHEDULER_INTERVAL_MS:30000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

app.security.enabled=${SECURITY_ENABLED:true}
app.security.api-keys.admin=${API_KEY_ADMIN:dev-admin-key}
app.security.api-keys.viewer=${API_KEY_VIEWER:dev-viewer-key}
app.security.rate-limit-per-minute=${RATE_LIMIT_PER_MINUTE:120}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true
management.metrics.tags.application=task-manager

info.app.name=Task Manager Service
info.app.version=0.0.1-SNAPSHOT

logging.level.root=INFO
logging.level.com.example.taskmanager=INFO
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n
